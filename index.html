<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ashtray Tracker</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
}

video{
  width:100%;
  max-width:640px;
  border:5px solid red;
}

#result{
  font-size:40px;
  font-weight:bold;
  margin-top:20px;
}
</style>

</head>

<body>

<h2>Ashtray Tracker</h2>

<video id="video" autoplay playsinline></video>

<div id="result">
SEARCH
</div>

<script>

navigator.mediaDevices.getUserMedia({
  video:{
    facingMode:"environment"
  }
})
.then(function(stream){

  document.getElementById("video").srcObject = stream;

})
.catch(function(err){

  alert("Camera Error : " + err);

});

const result = document.getElementById("result");

setInterval(() => {

  const video = document.getElementById("video");

  if(!video.videoWidth) return;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  const img = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  );

  let whiteCount = 0;
  let sumX = 0;

  for(let y=0;y<img.height;y+=4){

    for(let x=0;x<img.width;x+=4){

      const i = (y * img.width + x) * 4;

      const r = img.data[i];
      const g = img.data[i+1];
      const b = img.data[i+2];

      if(
        r > 180 &&
        g > 180 &&
        b > 180
      ){
        whiteCount++;
        sumX += x;
      }
    }
  }

  if(whiteCount < 100){

    result.innerText = "SEARCH";
    return;

  }

  const centerX = sumX / whiteCount;

  if(centerX < img.width/3){

    result.innerText = "LEFT";

  }else if(centerX > img.width*2/3){

    result.innerText = "RIGHT";

  }else{

    result.innerText = "CENTER";

  }

},300);

</script>

</body>
</html>
